<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InclusionHub | Acceso Corporativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .modal { display: none; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #registerModal::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body class="bg-emerald-950 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[3rem] p-10 shadow-2xl text-slate-900 relative">
        <!-- Botón para volver al inicio (Aspirantes/Empleados) -->
        <a href="inicio.html" class="absolute top-6 right-8 text-slate-300 hover:text-emerald-600 transition-colors">
            <i class="fas fa-arrow-left text-sm mr-1"></i> <span class="text-[10px] font-bold uppercase">Aspirantes</span>
        </a>

        <div class="text-center mb-10">
            <div class="inline-flex p-4 bg-emerald-100 text-emerald-600 rounded-3xl mb-4 shadow-inner">
                <i class="fas fa-building text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-emerald-900">Empresas</h1>
            <p class="text-slate-500 text-sm mt-2">Accede a tu panel de reclutamiento inclusivo</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-2 tracking-widest">Correo Corporativo</label>
                <input type="email" id="login-email" required placeholder="nombre@empresa.com" 
                       class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all">
            </div>
            <div>
                <div class="flex justify-between items-center mb-2 ml-2">
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest">Contraseña</label>
                    <!-- <a href="#" class="text-[10px] font-bold text-emerald-600 hover:underline">¿Olvidaste tu contraseña?</a> -->
                </div>
                <input type="password" required placeholder="••••••••" 
                       class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all">
            </div>

            <button type="submit" id="login-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-emerald-100 hover:bg-emerald-700 transform hover:-translate-y-1 transition-all uppercase tracking-widest text-sm">
                Entrar al Panel <i class="fas fa-chevron-right ml-2 text-xs"></i>
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400 font-bold">¿Aún no eres partner?</p>
            <button onclick="toggleModal(true)" class="text-emerald-600 font-black text-sm uppercase mt-2 hover:underline tracking-tight">
                Registrar mi Empresa
            </button>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="registerModal" class="modal fixed inset-0 bg-emerald-950/90 backdrop-blur-md z-50 items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white max-w-lg w-full rounded-[2.5rem] p-8 md:p-10 text-slate-900 shadow-2xl relative my-auto">
            <button onclick="toggleModal(false)" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600 transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
            
            <div class="mb-8">
                <h2 class="text-2xl font-black text-emerald-900">Crear Cuenta Empresa</h2>
                <p class="text-slate-500 text-sm">Únete a la red líder en inclusión laboral.</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 ml-2">Nombre Comercial</label>
                        <input type="text" id="reg-name" required placeholder="Ej: TechInclusion" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 ml-2">Sector</label>
                        <select id="reg-sector" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 appearance-none bg-white">
                            <option>Tecnología</option>
                            <option>Servicios</option>
                            <option>Manufactura</option>
                            <option>Comercio</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 ml-2">Email Corporativo</label>
                    <input type="email" id="reg-email" required placeholder="hr@tuempresa.com" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 ml-2">Contraseña</label>
                    <input type="password" required placeholder="••••••••" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all">
                </div>
                
                <div class="flex items-start gap-3 py-2">
                    <input type="checkbox" required class="mt-1 accent-emerald-600 h-4 w-4">
                    <p class="text-[10px] text-slate-400 leading-tight">Acepto los términos de compromiso de inclusión y política de privacidad de InclusionHub.</p>
                </div>

                <button type="submit" id="reg-submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black hover:bg-emerald-600 transition-all uppercase tracking-widest text-xs">
                    Completar Registro
                </button>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('registerModal');
            if(show) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // Manejo del Login con Redirección
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const btn = document.getElementById('login-btn');
            
            // Simulación de validación en LocalStorage
            const companies = JSON.parse(localStorage.getItem('hub_companies')) || [];
            const company = companies.find(c => c.email === email);
            
            if(company) {
                // Guardar sesión y redirigir
                sessionStorage.setItem('current_company', JSON.stringify(company));
                btn.innerText = "ACCEDIENDO...";
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = 'empresa.html';
                }, 800);
            } else {
                // Mensaje de error personalizado en lugar de alert directo si se desea, 
                // pero mantengo alert para simplicidad según código anterior
                alert("Empresa no registrada. Por favor, crea una cuenta primero.");
            }
        });

        // Manejo del Registro
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('reg-submit-btn');
            const newCompany = {
                id: 'comp_' + Date.now(),
                name: document.getElementById('reg-name').value,
                sector: document.getElementById('reg-sector').value,
                email: document.getElementById('reg-email').value
            };

            const companies = JSON.parse(localStorage.getItem('hub_companies')) || [];
            
            if(companies.some(c => c.email === newCompany.email)) {
                alert("Este correo ya está registrado.");
                return;
            }

            companies.push(newCompany);
            localStorage.setItem('hub_companies', JSON.stringify(companies));

            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            setTimeout(() => {
                alert("¡Registro exitoso! Ahora puedes entrar con tu correo.");
                toggleModal(false);
                btn.innerText = "Completar Registro";
                btn.disabled = false;
                e.target.reset();
            }, 1000);
        });

        window.onclick = function(event) {
            const modal = document.getElementById('registerModal');
            if (event.target == modal) {
                toggleModal(false);
            }
        }
    </script>
</body>
</html>
